name: PR CI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to test"
        required: false
        type: string

jobs:
  integration-cross-platform:
    name: compiler-integration-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Shared OCaml+Go setup
        uses: ./.github/actions/setup-ocaml-go
        with:
          cache-prefix: marmoset-manual-cross-platform-v2

      - name: Run compiler integration suite
        run: opam exec -- bash ./test/integration.sh
