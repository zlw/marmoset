name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      ocaml: ${{ steps.filter.outputs.ocaml }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ocaml:
              - 'lib/**'
              - 'bin/**'
              - 'marmoset-lsp/**'
              - 'dune-project'
              - '*.opam'
              - '.github/workflows/lint.yml'

  lint-doc:
    needs: changes
    if: needs.changes.outputs.ocaml == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.x
      - uses: ocaml/setup-ocaml/lint-doc@v3

  lint-fmt:
    needs: changes
    if: needs.changes.outputs.ocaml == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.x
      - uses: ocaml/setup-ocaml/lint-fmt@v3

  lint-opam:
    needs: changes
    if: needs.changes.outputs.ocaml == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.x
      - uses: ocaml/setup-ocaml/lint-opam@v3
