name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      compiler: ${{ steps.filter.outputs.compiler }}
      lsp: ${{ steps.filter.outputs.lsp }}
      integration: ${{ steps.filter.outputs.integration }}
      treesitter: ${{ steps.filter.outputs.treesitter }}
      vscode: ${{ steps.filter.outputs.vscode }}
      jetbrains: ${{ steps.filter.outputs.jetbrains }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            compiler:
              - 'lib/**'
              - 'bin/**'
              - 'dune-project'
              - 'marmoset.opam'
              - 'Makefile'
              - '.github/workflows/tests.yml'
            lsp:
              - 'lib/**'
              - 'bin/**'
              - 'marmoset-lsp/**'
              - 'dune-project'
              - 'marmoset.opam'
              - 'Makefile'
              - '.github/workflows/tests.yml'
            integration:
              - 'lib/**'
              - 'bin/**'
              - 'test/**'
              - 'dune-project'
              - 'marmoset.opam'
              - 'Makefile'
              - '.github/workflows/tests.yml'
            treesitter:
              - 'tools/tree-sitter-marmoset/**'
              - '.github/workflows/tests.yml'
            vscode:
              - 'tools/vscode-marmoset/**'
              - '.github/workflows/tests.yml'
            jetbrains:
              - 'tools/jetbrains-marmoset/**'
              - '.github/workflows/tests.yml'

  compiler-unit:
    name: Compiler Unit Tests
    needs: changes
    if: needs.changes.outputs.compiler == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.x

      - name: Pin linol 0.10
        run: |
          opam pin add linol https://github.com/c-cube/linol.git#v0.10 -n
          opam pin add linol-lwt https://github.com/c-cube/linol.git#v0.10 -n

      - run: opam install . --deps-only --with-test

      - run: opam exec -- make unit compiler

  lsp-unit:
    name: LSP Unit Tests
    needs: changes
    if: needs.changes.outputs.lsp == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.x

      - name: Pin linol 0.10
        run: |
          opam pin add linol https://github.com/c-cube/linol.git#v0.10 -n
          opam pin add linol-lwt https://github.com/c-cube/linol.git#v0.10 -n

      - run: opam install . --deps-only --with-test

      - run: opam exec -- make unit lsp

  treesitter:
    name: Tree-sitter Tests
    needs: changes
    if: needs.changes.outputs.treesitter == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run grammar tests
        working-directory: tools/tree-sitter-marmoset
        run: |
          npm install
          npm run generate
          npm test

  vscode-compile:
    name: VS Code Extension
    needs: changes
    if: needs.changes.outputs.vscode == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compile extension
        working-directory: tools/vscode-marmoset
        run: |
          npm install
          npm run compile

  jetbrains-compile:
    name: JetBrains Plugin
    needs: changes
    if: needs.changes.outputs.jetbrains == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build plugin
        working-directory: tools/jetbrains-marmoset
        run: ./gradlew buildPlugin

  integration-linux:
    name: Integration (Linux)
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.x

      - name: Set-up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Pin linol 0.10
        run: |
          opam pin add linol https://github.com/c-cube/linol.git#v0.10 -n
          opam pin add linol-lwt https://github.com/c-cube/linol.git#v0.10 -n

      - run: opam install . --deps-only --with-test

      - run: opam exec -- ./test/integration.sh
