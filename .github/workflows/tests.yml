name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  compiler-unit:
    name: Compiler Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.x

      - run: opam install . --deps-only --with-test

      - run: opam exec -- make unit compiler

  lsp-unit:
    name: LSP Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.x

      - run: opam install . --deps-only --with-test

      - run: opam exec -- make unit lsp

  treesitter:
    name: Tree-sitter Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run grammar tests
        working-directory: tools/tree-sitter-marmoset
        run: |
          npm install
          npm run generate
          npm test

  vscode-compile:
    name: VS Code Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compile extension
        working-directory: tools/vscode-marmoset
        run: |
          npm install
          npm run compile

  integration-linux:
    name: Integration (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.x

      - name: Set-up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - run: opam install . --deps-only --with-test

      - run: opam exec -- ./test/integration.sh
