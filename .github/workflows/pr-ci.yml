name: PR CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      compiler: ${{ steps.filter.outputs.compiler }}
      lsp: ${{ steps.filter.outputs.lsp }}
      treesitter: ${{ steps.filter.outputs.treesitter }}
      grammar_sync: ${{ steps.filter.outputs.grammar_sync }}
      zed: ${{ steps.filter.outputs.zed }}
      vscode: ${{ steps.filter.outputs.vscode }}
      nvim: ${{ steps.filter.outputs.nvim }}
      jetbrains: ${{ steps.filter.outputs.jetbrains }}
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Detect changed domains
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            compiler:
              - 'lib/frontend/**'
              - 'lib/backend/**'
              - 'lib/**'
              - 'bin/**'
              - 'test/integration/**'
              - 'test/ci/**'
              - 'dune-project'
              - '*.opam'
              - 'Makefile'
              - '.github/workflows/pr-ci.yml'
              - '.github/actions/setup-ocaml/action.yml'
              - '.github/actions/setup-ocaml-go/action.yml'
            lsp:
              - 'tools/lsp/**'
              - 'bin/**'
              - 'test/ci/**'
              - 'dune-project'
              - '*.opam'
              - 'Makefile'
              - '.github/workflows/pr-ci.yml'
              - '.github/actions/setup-ocaml/action.yml'
              - '.github/actions/setup-ocaml-go/action.yml'
            treesitter:
              - 'tools/tree-sitter-marmoset/**'
              - 'test/ci/tree-sitter.sh'
              - 'Makefile'
              - '.github/workflows/pr-ci.yml'
            grammar_sync:
              - 'tools/scripts/sync_textmate_grammars.sh'
              - 'tools/vscode-marmoset/syntaxes/marmoset.tmLanguage.json'
              - 'tools/jetbrains-marmoset/src/main/resources/textmate/syntaxes/marmoset.tmLanguage.json'
              - 'test/ci/grammar-sync.sh'
              - 'Makefile'
              - '.github/workflows/pr-ci.yml'
            zed:
              - 'tools/zed-marmoset/**'
              - 'test/ci/editor-zed.sh'
              - '.github/workflows/pr-ci.yml'
            vscode:
              - 'tools/vscode-marmoset/**'
              - 'test/ci/editor-vscode.sh'
              - '.github/workflows/pr-ci.yml'
            nvim:
              - 'tools/nvim-marmoset/**'
              - 'test/ci/editor-nvim.sh'
              - '.github/workflows/pr-ci.yml'
            jetbrains:
              - 'tools/jetbrains-marmoset/**'
              - 'test/ci/editor-jetbrains.sh'
              - '.github/workflows/pr-ci.yml'

  compiler-unit:
    name: compiler-unit
    needs: changes
    if: needs.changes.outputs.compiler == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Shared OCaml setup
        uses: ./.github/actions/setup-ocaml
        with:
          cache-prefix: marmoset-pr-ci-ocaml-v2

      - name: Run compiler unit tests
        run: opam exec -- make ci-compiler-unit

  compiler-integration-linux:
    name: compiler-integration-linux
    needs: changes
    if: needs.changes.outputs.compiler == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Shared OCaml+Go setup
        uses: ./.github/actions/setup-ocaml-go
        with:
          cache-prefix: marmoset-pr-ci-integration-v2

      - name: Run compiler integration (Linux)
        run: opam exec -- make ci-compiler-integration-linux

  lsp-unit:
    name: lsp-unit
    needs: changes
    if: needs.changes.outputs.lsp == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Shared OCaml setup
        uses: ./.github/actions/setup-ocaml
        with:
          cache-prefix: marmoset-pr-ci-ocaml-v2

      - name: Run LSP unit tests
        run: opam exec -- make ci-lsp-unit

  lsp-integration:
    name: lsp-integration
    needs: changes
    if: needs.changes.outputs.lsp == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Shared OCaml+Go setup
        uses: ./.github/actions/setup-ocaml-go
        with:
          cache-prefix: marmoset-pr-ci-integration-v2

      - name: Run LSP integration tests
        run: opam exec -- make ci-lsp-integration

  quality-lint-fmt-doc:
    name: quality-lint-fmt-doc
    needs: changes
    if: needs.changes.outputs.compiler == 'true' || needs.changes.outputs.lsp == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Shared OCaml setup
        uses: ./.github/actions/setup-ocaml
        with:
          cache-prefix: marmoset-pr-ci-ocaml-v2

      - name: Run quality checks
        run: opam exec -- make ci-quality-lint-fmt-doc

  tree-sitter:
    name: tree-sitter
    needs: changes
    if: needs.changes.outputs.treesitter == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tree-sitter checks
        run: make ci-tree-sitter

  grammar-sync:
    name: grammar-sync
    needs: changes
    if: needs.changes.outputs.grammar_sync == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Run grammar sync checks
        run: make ci-grammar-sync

  editor-zed:
    name: editor-zed
    needs: changes
    if: needs.changes.outputs.zed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Zed editor tests
        run: make ci-editor-zed

  editor-vscode:
    name: editor-vscode
    needs: changes
    if: needs.changes.outputs.vscode == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run VS Code editor tests
        run: make ci-editor-vscode

  editor-nvim:
    name: editor-nvim
    needs: changes
    if: needs.changes.outputs.nvim == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Run Neovim editor tests
        run: make ci-editor-nvim

  editor-jetbrains:
    name: editor-jetbrains
    needs: changes
    if: needs.changes.outputs.jetbrains == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run JetBrains editor tests
        run: make ci-editor-jetbrains

  summary:
    name: summary
    needs:
      - changes
      - compiler-unit
      - compiler-integration-linux
      - lsp-unit
      - lsp-integration
      - quality-lint-fmt-doc
      - tree-sitter
      - grammar-sync
      - editor-zed
      - editor-vscode
      - editor-nvim
      - editor-jetbrains
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    steps:
      - name: Print CI routing summary
        run: |
          echo "Detected change domains:"
          echo "  compiler=${{ needs.changes.outputs.compiler }}"
          echo "  lsp=${{ needs.changes.outputs.lsp }}"
          echo "  treesitter=${{ needs.changes.outputs.treesitter }}"
          echo "  grammar_sync=${{ needs.changes.outputs.grammar_sync }}"
          echo "  zed=${{ needs.changes.outputs.zed }}"
          echo "  vscode=${{ needs.changes.outputs.vscode }}"
          echo "  nvim=${{ needs.changes.outputs.nvim }}"
          echo "  jetbrains=${{ needs.changes.outputs.jetbrains }}"
          echo ""
          echo "Job results:"
          echo "  compiler-unit=${{ needs.compiler-unit.result }}"
          echo "  compiler-integration-linux=${{ needs.compiler-integration-linux.result }}"
          echo "  lsp-unit=${{ needs.lsp-unit.result }}"
          echo "  lsp-integration=${{ needs.lsp-integration.result }}"
          echo "  quality-lint-fmt-doc=${{ needs.quality-lint-fmt-doc.result }}"
          echo "  tree-sitter=${{ needs.tree-sitter.result }}"
          echo "  grammar-sync=${{ needs.grammar-sync.result }}"
          echo "  editor-zed=${{ needs.editor-zed.result }}"
          echo "  editor-vscode=${{ needs.editor-vscode.result }}"
          echo "  editor-nvim=${{ needs.editor-nvim.result }}"
          echo "  editor-jetbrains=${{ needs.editor-jetbrains.result }}"

      - name: Gate on failures
        if: >-
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more jobs failed or were cancelled."
          exit 1
